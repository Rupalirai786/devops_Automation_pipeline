name: automationscript
on:
 push:
  branches:
  - main
jobs:
 job_one:
   name: Build job
   runs-on: ubuntu-latest
   steps:
    - name: cloning
      uses: actions/checkout@v4
    - name: generating image from dockerfile
      run: docker build -t img .
    - name: running container
      run: docker run --name cont img:latest   
 job_two:
   name: pushing_image
   runs-on: ubuntu-latest 
   steps: 
    - name: cloning repo
      uses: actions/checkout@v4
    - name: logging in to registry
      uses: docker/login-action@v3
      with: 
       registry: ghcr.io
       username: ${{ github.actor }}
       password: ${{ secrets.GITHUB_TOKEN }}
    - name: building and pushing image 
      run: | 
           docker build -t ghcr.io/rupalirai786/img:latest .  
           docker push ghcr.io/rupalirai786/img:latest
